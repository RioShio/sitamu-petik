<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Security - SITAMU PeTIK</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="text-slate-900 dark:text-slate-100 font-body-md text-body-md min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative overflow-hidden">

    <div class="absolute inset-0 z-0">
        <img src="{{ url_for('static', filename='foto/background_login.jpg') }}" alt="PeTIK Jombang" class="w-full h-full object-cover" />

        <div class="absolute inset-0 bg-slate-100/70 dark:bg-slate-900/80 backdrop-blur-[2px] transition-colors duration-300"></div>
    </div>

    <button id="themeToggle" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm border border-slate-200/50 dark:border-slate-700/50 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 transition-colors z-10">
        <span id="themeIconDark" class="material-symbols-outlined dark:hidden">dark_mode</span>
        <span id="themeIconLight" class="material-symbols-outlined hidden dark:block text-amber-400">light_mode</span>
    </button>

    <div class="w-full max-w-md bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-3xl p-8 sm:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.08)] dark:shadow-2xl border border-white/50 dark:border-slate-700/50 relative z-10 transition-colors">

        <div class="flex flex-col items-center text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-blue-600 dark:bg-blue-500 text-white flex items-center justify-center shadow-lg shadow-blue-600/20 dark:shadow-none mb-4 transition-colors">
                <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">security</span>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white transition-colors">SITAMU PeTIK</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 transition-colors">Sistem Informasi Buku Tamu Digital</p>
        </div>

        {% if error %}
        <div class="mb-6 p-3 bg-red-50/90 dark:bg-red-900/30 border border-red-100 dark:border-red-900/50 rounded-xl text-center transition-colors">
            <p class="text-xs font-bold text-red-600 dark:text-red-400">{{ error }}</p>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 transition-colors">Username ID</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">badge</span>
                    <input type="text" name="username" required class="w-full bg-slate-100/80 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pl-11 pr-4 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-400" placeholder="Masukkan username">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 transition-colors">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">lock</span>
                    <input type="password" name="password" required class="w-full bg-slate-100/80 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pl-11 pr-4 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-400" placeholder="••••••••">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 dark:bg-blue-500 text-white py-3.5 rounded-xl text-sm font-extrabold flex items-center justify-center gap-2 hover:bg-blue-700 dark:hover:bg-blue-600 transition-colors shadow-md shadow-blue-600/20 dark:shadow-none">
                    Masuk Pos Penjagaan <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </div>
        </form>

        <p class="text-center text-[10px] text-slate-400 dark:text-slate-500 mt-8 font-medium transition-colors">
            &copy; 2024 PeTIK Jombang. All rights reserved.
        </p>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        themeToggleBtn.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });
    </script>
</body>
</html>

<header class="bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-30 h-[72px] flex items-center justify-between px-6 md:px-8 border-b border-slate-100 dark:border-slate-800 transition-colors duration-300">

    <div class="flex items-center gap-4 flex-1">
        <button id="btnOpenSidebar" class="md:hidden p-2 -ml-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 focus:outline-none transition-colors">
            <span class="material-symbols-outlined">menu</span>
        </button>

        <div class="hidden md:flex relative w-full max-w-[480px] group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-[20px] transition-colors">search</span>

            <!-- Placeholder search berubah tergantung role -->
            <input type="text"
                   placeholder="{% if session.get('role') == 'admin' %}Cari data master, pengguna, atau log...{% else %}Search for visitors, entities or ID...{% endif %}"
                   class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-full py-2.5 pl-11 pr-4 text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all outline-none"/>
        </div>
    </div>

    <div class="flex items-center gap-2 sm:gap-4 shrink-0">

        <button id="themeToggle" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
            <span id="themeIconDark" class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span id="themeIconLight" class="material-symbols-outlined hidden dark:block text-amber-400">light_mode</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors relative">
            <span class="material-symbols-outlined">notifications</span>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-50 dark:border-slate-900 transition-colors"></span>
        </button>

        <div class="hidden md:block h-8 w-px bg-slate-200 dark:bg-slate-700 mx-1 transition-colors"></div>

        <!-- Profil User Dinamis (Admin vs Security) -->
        <button class="flex items-center gap-3 p-1 rounded-lg hover:opacity-80 transition-opacity">
            <div class="text-right hidden md:block">
                {% if session.get('role') == 'admin' %}
                    <p class="text-sm font-bold text-slate-900 dark:text-white m-0 leading-tight transition-colors">Administrator</p>
                    <p class="text-xs text-emerald-500 dark:text-emerald-400 font-medium m-0 transition-colors">Sistem Pusat PeTIK</p>
                {% else %}
                    <p class="text-sm font-bold text-slate-900 dark:text-white m-0 leading-tight transition-colors">Pos Utama</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400 m-0 transition-colors">Security Station Hub</p>
                {% endif %}
            </div>

            <!-- Avatar berubah tergantung role -->
            {% if session.get('role') == 'admin' %}
                <img alt="Profile" class="w-10 h-10 rounded-full object-cover ring-2 ring-slate-200 dark:ring-slate-700 transition-colors" src="https://ui-avatars.com/api/?name=Admin+Sistem&background=1e293b&color=fff"/>
            {% else %}
                <img alt="Profile" class="w-10 h-10 rounded-full object-cover ring-2 ring-slate-200 dark:ring-slate-700 transition-colors" src="https://ui-avatars.com/api/?name=Pos+Utama&background=0D8ABC&color=fff"/>
            {% endif %}
        </button>

    </div>
</header>
